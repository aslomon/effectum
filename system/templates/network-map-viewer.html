<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{PROJECT_NAME}} — Network Map</title>
    <script src="https://cdn.jsdelivr.net/npm/mermaid@11/dist/mermaid.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif; background: #0d1117; color: #e6edf3; min-height: 100vh; }
        .header { padding: 20px 24px 12px; border-bottom: 1px solid #21262d; }
        .header h1 { font-size: 1.3em; font-weight: 600; }
        .header .meta { color: #8b949e; font-size: 0.85em; margin-top: 4px; }
        .header .meta span { margin-right: 16px; }
        .toolbar { padding: 12px 24px; display: flex; gap: 8px; border-bottom: 1px solid #21262d; }
        .toolbar button { background: #21262d; color: #e6edf3; border: 1px solid #30363d; border-radius: 6px; padding: 6px 14px; font-size: 0.85em; cursor: pointer; transition: background 0.15s; }
        .toolbar button:hover { background: #30363d; }
        .toolbar button.active { background: #1f6feb; border-color: #1f6feb; }
        .map-container { padding: 24px; overflow: auto; min-height: calc(100vh - 120px); display: flex; justify-content: center; }
        .mermaid { background: #161b22; border-radius: 12px; padding: 32px; max-width: 100%; }
        .mermaid svg { max-width: 100%; height: auto; }
        .legend { position: fixed; bottom: 20px; right: 20px; background: #161b22; border: 1px solid #30363d; border-radius: 8px; padding: 12px 16px; font-size: 0.8em; }
        .legend-item { display: flex; align-items: center; gap: 8px; margin: 4px 0; }
        .legend-dot { width: 12px; height: 12px; border-radius: 3px; }
        .legend-dot.planned { background: #f3f4f6; border: 1px solid #9ca3af; }
        .legend-dot.progress { background: #dbeafe; border: 1px solid #3b82f6; }
        .legend-dot.done { background: #dcfce7; border: 1px solid #22c55e; }
    </style>
</head>
<body>
    <div class="header">
        <h1>🗺️ {{PROJECT_NAME}} — Network Map</h1>
        <div class="meta">
            <span>Generated by Effectum</span>
            <span>{{GENERATED_AT}}</span>
        </div>
    </div>
    <div class="toolbar">
        <button class="active" onclick="setDirection('TB')">Top → Bottom</button>
        <button onclick="setDirection('LR')">Left → Right</button>
        <button onclick="toggleTheme()">🌓 Theme</button>
        <button onclick="downloadSVG()">📥 Export SVG</button>
    </div>
    <div class="map-container">
        <pre class="mermaid" id="diagram">
{{MERMAID_CONTENT}}
        </pre>
    </div>
    <div class="legend">
        <div class="legend-item"><div class="legend-dot planned"></div> Planned</div>
        <div class="legend-item"><div class="legend-dot progress"></div> In Progress</div>
        <div class="legend-item"><div class="legend-dot done"></div> Done</div>
    </div>
    <script>
        let currentTheme = 'dark';
        let currentDirection = 'TB';
        const originalContent = document.getElementById('diagram').textContent;

        mermaid.initialize({ startOnLoad: true, theme: currentTheme, flowchart: { useMaxWidth: true, htmlLabels: true, curve: 'basis' } });

        function setDirection(dir) {
            currentDirection = dir;
            const content = originalContent.replace(/graph (TB|LR|TD|RL)/, 'graph ' + dir);
            document.getElementById('diagram').textContent = content;
            document.getElementById('diagram').removeAttribute('data-processed');
            mermaid.run();
            document.querySelectorAll('.toolbar button').forEach(b => b.classList.remove('active'));
            event.target.classList.add('active');
        }

        function toggleTheme() {
            currentTheme = currentTheme === 'dark' ? 'default' : 'dark';
            document.body.style.background = currentTheme === 'dark' ? '#0d1117' : '#ffffff';
            document.body.style.color = currentTheme === 'dark' ? '#e6edf3' : '#1f2328';
            document.querySelector('.mermaid').style.background = currentTheme === 'dark' ? '#161b22' : '#f6f8fa';
            mermaid.initialize({ theme: currentTheme, flowchart: { useMaxWidth: true, htmlLabels: true, curve: 'basis' } });
            document.getElementById('diagram').removeAttribute('data-processed');
            mermaid.run();
        }

        function downloadSVG() {
            const svg = document.querySelector('.mermaid svg');
            if (!svg) return;
            const blob = new Blob([svg.outerHTML], { type: 'image/svg+xml' });
            const a = document.createElement('a');
            a.href = URL.createObjectURL(blob);
            a.download = '{{PROJECT_NAME}}-network-map.svg';
            a.click();
        }
    </script>
</body>
</html>
