# Web Feature — 3 Teammates
# Standard web feature with frontend, backend, and tests.

name: web-feature
description: "Standard web feature with frontend, backend, and tests"
teammate_count: 3
min_acs: 6
recommended_for:
  app_types: [web-app]
  stacks: [nextjs-supabase, nextjs-firebase, nextjs-prisma]

lead:
  role: "Orchestrator — distributes tasks, reviews code, synthesizes results"
  instructions: "Create tasks from the PRD, assign to teammates based on file ownership, monitor progress, run /verify when all teammates complete"

teammates:
  - name: frontend
    agent: frontend-developer
    role: "UI components, pages, styling, responsive design"
    file_ownership:
      - "src/components/"
      - "src/app/**/page.tsx"
      - "src/app/**/layout.tsx"
    model_hint: sonnet

  - name: backend
    agent: backend-developer
    role: "API routes, services, data layer, database migrations"
    file_ownership:
      - "src/lib/"
      - "src/app/api/"
      - "supabase/"
    model_hint: sonnet

  - name: testing
    agent: test-automator
    role: "Unit tests, integration tests, E2E tests"
    file_ownership:
      - "tests/"
      - "e2e/"
      - "**/*.test.*"
    model_hint: sonnet

phases:
  - name: "Database + Types"
    tasks_for: [backend]
    quality_gate: "Migrations applied, types generated"
  - name: "API + UI (parallel)"
    tasks_for: [backend, frontend]
    parallel: true
    quality_gate: "API responds, components render"
  - name: "Tests"
    tasks_for: [testing]
    depends_on: ["Database + Types", "API + UI (parallel)"]
    quality_gate: "All tests pass, 80%+ coverage"

cost_estimate:
  min_iterations: 15
  max_iterations: 40
  estimated_tokens: "150k-400k"

hooks:
  TeammateIdle:
    check_tasks_completed: true
    check_tests_passing: true
  TaskCompleted:
    validate_acs_met: true
    validate_tests_exist: true
